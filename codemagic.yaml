workflows:
  ios-app-store-build:
    name: BrightIQ iOS App Store & TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Arvonas_API_Key
    
    # ARTIK BULUT KASAMIZDA ÖZEL ANAHTAR (PRIVATE KEY) VAR!
    # Bu blok artık 0. saniyede hata vermeyecek; profili çekip hafızaya alacak!
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.arvonas.brightiq
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: 1. Node.js ve Eklenti Paketlerini Yükle
        script: |
          echo "npm bağımlılıkları kuruluyor..."
          npm install

      - name: 2. Web Uygulamasını Derle (Vite Build)
        script: |
          echo "React / Vite web projesi derleniyor..."
          npm run build

      - name: 3. Capacitor iOS Senkronizasyonu ve CocoaPods Kurulumu
        script: |
          echo "Web çıktıları ve eklentiler iOS projesine aktarılıyor..."
          if [ ! -f "ios/App/Podfile" ]; then
            echo "Podfile bulunamadı! Bulut sunucusunda CocoaPods altyapısıyla sıfırdan iOS projesi yaratılıyor..."
            rm -rf ios
            npx cap add ios --packagemanager cocoapods
          fi
          npx cap sync ios

      - name: 4. CocoaPods Bağımlılıklarını Yenile ve Yükle
        script: |
          echo "CocoaPods paketleri Apple M2 sunucusunda derleniyor..."
          cd ios/App && pod install --repo-update

      # --- İŞTE EKSİK PARÇA BURASIYDI ---
      - name: 5. İmza Profillerini Xcode Projesine Bağla
        script: |
          echo "Codemagic hafızasındaki imza profilleri projenin içine çakılıyor..."
          xcode-project use-profiles
      # ----------------------------------

      - name: 6. iOS Projesini Derle ve .ipa İmzala
        script: |
          echo "App Store paketi (.ipa) oluşturuluyor..."
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Harici Test Kullanicilari" # App Store Connect teki grubunun adı
        submit_to_app_store: false