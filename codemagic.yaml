workflows:
  ios-app-store-build:
    name: BrightIQ iOS App Store & TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Arvonas_API_Key
    
    environment:
      groups:
        - test
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.arvonas.brightiq
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: 1. Node.js ve Eklenti Paketlerini Yükle
        script: |
          echo "npm bağımlılıkları kuruluyor..."
          npm install

      - name: 2. Web Uygulamasını Derle (Vite Build)
        script: |
          echo "React / Vite web projesi derleniyor..."
          npm run build

      - name: 3. Firebase iOS Yapılandırmasını Hazırla
        script: |
          echo "Firebase iOS yapılandırması Codemagic secure env üzerinden hazırlanıyor..."
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST_B64" ]; then
            echo "HATA: GOOGLE_SERVICE_INFO_PLIST_B64 environment variable bulunamadı."
            echo "Codemagic > Environment variables içine GoogleService-Info.plist dosyasının base64 halini secure variable olarak eklemelisin."
            echo "Not: Variable bir gruptaysa, bu grup codemagic.yaml içinde environment > groups altında import edilmelidir."
            exit 1
          fi

          mkdir -p ios/App/App
          if printf "%s" "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > ios/App/App/GoogleService-Info.plist 2>/dev/null; then
            echo "GoogleService-Info.plist base64 --decode ile oluşturuldu."
          else
            printf "%s" "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 -D > ios/App/App/GoogleService-Info.plist
            echo "GoogleService-Info.plist base64 -D ile oluşturuldu."
          fi

          plutil -lint ios/App/App/GoogleService-Info.plist

      - name: 4. Capacitor iOS Senkronizasyonu ve CocoaPods Kurulumu
        script: |
          echo "Web çıktıları ve eklentiler iOS projesine aktarılıyor..."
          if [ ! -f "ios/App/Podfile" ]; then
            echo "Podfile bulunamadı! Bulut sunucusunda CocoaPods altyapısıyla sıfırdan iOS projesi yaratılıyor..."
            rm -rf ios
            npx cap add ios --packagemanager cocoapods
          fi
          npx cap sync ios

      - name: 5. CocoaPods Bağımlılıklarını Yenile ve Yükle
        script: |
          echo "CocoaPods paketleri Apple M2 sunucusunda derleniyor..."
          cd ios/App
          pod install --repo-update

      - name: 6. İmza Profillerini Projeye İşle
        script: |
          echo "Codemagic kasasından gelen imza profili Xcode projesine çakılıyor..."
          echo "macOS AppleDouble dosyaları temizleniyor..."
          find . -name "._*" -print -delete
          find . -name ".DS_Store" -print -delete
          find . -name "__MACOSX" -type d -prune -print -exec rm -rf {} \;
          xcode-project use-profiles

      # --- İŞTE CAPACITOR'I ATLATIP APPLE'IN SÜRÜM ENGELİNİ YIKAN KRİTİK ADIM ---
      - name: 7. Sürüm Numarasını Yükselt, Derle ve .ipa İmzala
        script: |
          echo "Apple için sürüm numarası 1.0.3 ve derleme numarası dinamik olarak ayarlanıyor..."
          cd ios/App && agvtool new-marketing-version 1.0.3
          agvtool new-version -all $BUILD_NUMBER
          cd ../..
          
          echo "App Store paketi (.ipa) oluşturuluyor..."
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

          echo "İmzalanmış IPA entitlements kontrol ediliyor..."
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            rm -rf /tmp/brightiq_ipa_check
            mkdir -p /tmp/brightiq_ipa_check
            unzip -q "$IPA_PATH" -d /tmp/brightiq_ipa_check
            APP_PATH=$(find /tmp/brightiq_ipa_check/Payload -name "*.app" -type d | head -n 1)
            if [ -n "$APP_PATH" ]; then
              codesign -d --entitlements :- "$APP_PATH" || true
            else
              echo "IPA içinde .app bulunamadı."
            fi
          else
            echo "IPA bulunamadı; entitlement kontrolü atlandı."
          fi
      # -------------------------------------------------------------------------

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "test"
        submit_to_app_store: false
