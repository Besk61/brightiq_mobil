workflows:
  ios-app-store-build:
    name: BrightIQ iOS App Store & TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Arvonas_API_Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.arvonas.brightiq
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Harici Test Kullanicilari"
        submit_to_app_store: false