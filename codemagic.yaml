workflows:
  ios-app-store-build:
    name: BrightIQ iOS App Store & TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2 # M2 Apple Silicon çip (iOS 18+ SDK ve sıfır mimari hatası için!)
    
    environment:
      ios_signing:
        distribution_type: app_store # Mağaza veya TestFlight için app_store olmalı
        bundle_identifier: com.arvonas.brightiq # DİKKAT: Buraya Xcode'daki gerçek Bundle ID'ni yaz
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20 # React 19 ve Vite için modern Node sürümü
      xcode: latest # En güncel Xcode sürümünü (16+) zorla kullanır
      cocoapods: default

    scripts:
      - name: 1. Node.js ve Eklenti Paketlerini Yükle
        script: |
          echo "npm bağımlılıkları kuruluyor..."
          npm install

      - name: 2. Web Uygulamasını Derle (Vite Build)
        script: |
          echo "React / Vite web projesi derleniyor..."
          npm run build

      - name: 3. Capacitor iOS Senkronizasyonu
        script: |
          echo "Web çıktıları ve eklentiler iOS projesine aktarılıyor..."
          npx cap sync ios

      - name: 4. CocoaPods Bağımlılıklarını Yenile ve Yükle
        script: |
          echo "CocoaPods paketleri Apple M2 sunucusunda derleniyor..."
          cd ios/App && pod install --repo-update

      - name: 5. iOS Projesini Derle ve .ipa İmzala
        script: |
          echo "App Store paketi (.ipa) oluşturuluyor..."
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration # Codemagic arayüzünden bağlayacağın Apple API anahtarını kullanır
        submit_to_testflight: true # Build bitince otomatik TestFlight'a atar
        submit_to_app_store: false # Mağazaya direkt incelemeye göndermez, önce TestFlight'a düşer